<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="rock.css">
</head>
<body>
    <div class="game-container">
        <h1>Rock Paper Scissors</h1>
        <div class="score-container">
            <p>Player: <span id="player-score">0</span></p>
            <p>Computer: <span id="computer-score">0</span></p>
        </div>
        <div class="options-container">
            <button id="rock" class="btn">🧱</button>
            <button id="paper" class="btn">📃</button>
            <button id="scissors" class="btn">✂</button>
        </div>
        <p id="results-msg">Make your choice!</p>
    </div>
    <script src="rock.js"></script>
</body>
</html>
